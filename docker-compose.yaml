services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - BACKEND_URL=${BACKEND_URL}
        - BACKEND_PORT=${BACKEND_PORT}
    ports:
      - ${FRONTEND_PORT}:80
    env_file:
      - .env
    depends_on:
      - backend
    restart: on-failure
    
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    ports:
      - ${BACKEND_PORT}:8080
    depends_on:
      - db
    restart: on-failure

  db:
    image: postgres:15
    env_file:
      - .env
    ports:
      - ${POSTGRES_PORT}:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: on-failure

volumes:
  postgres_data:

