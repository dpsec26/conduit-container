services:
  frontend:
    image: ghcr.io/${REPOSITORY_OWNER}/conduit-frontend:${FRONTEND_IMAGE_TAG:-latest}
    ports:
      - ${FRONTEND_PORT}:80
    env_file:
      - .env
    depends_on:
      - backend
    restart: on-failure
    
  backend:
    image: ghcr.io/${REPOSITORY_OWNER}/conduit-backend:${BACKEND_IMAGE_TAG:-latest}
    env_file:
      - .env
    ports:
      - ${BACKEND_PORT}:8080
    depends_on:
      - db
    volumes:
      - backend_data:/backend/data
    restart: on-failure

  db:
    image: postgres:15
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: on-failure

volumes:
  postgres_data:
  backend_data:

